name: HyprMac
options:
  bundleIdPrefix: com.zachgray
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

settings:
  base:
    SWIFT_OBJC_BRIDGING_HEADER: HyprMac/PrivateAPI/HyprMac-Bridging-Header.h
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    SWIFT_VERSION: "5.9"

schemes:
  HyprMac:
    build:
      targets:
        HyprMac: all
        HyprMacTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HyprMacTests

targets:
  HyprMac:
    type: application
    platform: macOS
    sources:
      - HyprMac
    dependencies:
      - package: Sparkle
    settings:
      base:
        INFOPLIST_FILE: HyprMac/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.zachgray.HyprMac
        MARKETING_VERSION: "0.4.7"
        CURRENT_PROJECT_VERSION: "57"
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: $(DEVELOPMENT_TEAM)
        CODE_SIGN_ENTITLEMENTS: HyprMac/HyprMac.entitlements
        ENABLE_HARDENED_RUNTIME: false
        OTHER_LDFLAGS:
          - "-F/System/Library/PrivateFrameworks"
          - "-framework"
          - "SkyLight"

  HyprMacTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - HyprMacTests
    dependencies:
      - target: HyprMac
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.zachgray.HyprMacTests
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGN_STYLE: Automatic
        CODE_SIGNING_ALLOWED: "YES"
        ENABLE_HARDENED_RUNTIME: false
        SWIFT_OBJC_BRIDGING_HEADER: HyprMac/PrivateAPI/HyprMac-Bridging-Header.h
