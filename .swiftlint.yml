# SwiftLint config.
#
# `strict: false` keeps warnings from failing the build for now. The
# thresholds below are tightened from the Phase 0 baseline so that
# new code respects the post-refactor structure (smaller types,
# shorter functions). The current codebase is documented to exceed a
# handful of these — `WindowManager` and `TilingEngine` are
# explicitly over the type-body / file-length targets, see
# REFACTOR_PLAN.md §11 — and existing files are excluded from
# escalation by keeping `strict: false` until those reductions land.

included:
  - HyprMac
  - HyprMacTests

excluded:
  - build
  - HyprMac.xcodeproj
  - HyprMac/PrivateAPI
  - HyprMac/Resources

strict: false

disabled_rules:
  - identifier_name        # short names like w, l, r are intentional in BSP code
  - todo                   # legitimate TODOs are tracked in REFACTOR_PLAN.md / docs/
  - trailing_whitespace
  - large_tuple            # WindowChanges.screenDrift is a labeled 3-tuple by design

opt_in_rules:
  - empty_count
  - explicit_init
  - first_where
  - last_where
  - reduce_into
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unused_import
  - force_unwrapping

# CGS bridging-header sites legitimately need force-unwraps where the
# CFTypeID is already validated. PrivateAPI is excluded above; AX
# bridging in HyprWindow / AccessibilityManager carries adjacent
# CFGetTypeID guards and would be too noisy to refactor case-by-case.
force_unwrapping:
  excluded:
    - HyprMac/Models/HyprWindow.swift
    - HyprMac/Core/AccessibilityManager.swift
    - HyprMac/Core/Orchestration/ActionDispatcher.swift

line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true
  ignores_function_declarations: true

function_body_length:
  warning: 80
  error: 200

type_body_length:
  warning: 500
  error: 1500

file_length:
  warning: 700
  error: 2000
  ignore_comment_only_lines: true

cyclomatic_complexity:
  warning: 15
  error: 30

nesting:
  type_level: 2
